            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/">Contact</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"

                        <ul class="dropdown-menu">

                    <button class="btn btn-primary">login</button>
                    <button class="btn btn-success">register</button>
                </div>
            </div>
        </div>
    </nav>
    <h1 class="text-center">Welcome to Our Website 🙏</h1>

    <div class="container">
        <div class="d-none alert alert-success alert-dismissible fade show" role="alert">
            <h3 id="message"></h3>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="right d-flex justify-content-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">Upload File</button>
        </div>


        <table id="filesTable" class="table table-striped">
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Path</th>
                    <th>Upload Date</th>
                    <th>Size(KB)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
            <tfoot>
                <tr>
                    <th>File Name</th>
                    <th>Path</th>
                    <th>Upload Date</th>
                    <th>Size(KB)</th>
                    <th>Actions</th>
                </tr>
            </tfoot>
        </table>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="viewModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <form enctype="multipart/form-data" name="myform" id="myform">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">View File</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">

                        <iframe src="" width="100%" height="550px"></iframe>

                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
